<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Personal Details</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/form.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="form-box">

        <h1>Personal Details</h1>

        <p>Please fill your personal information carefully.</p>

        <form action="/academic" method="POST">

            <div class="grid">

                <!-- Full Name -->
                <div class="input-box">
                    <label>Full Name</label>
                    <input
                        type="text"
                        name="fullname"
                        placeholder="Enter your full name"
                        required>
                </div>

                <!-- Date of Birth -->
                <div class="input-box">
                    <label>Date of Birth</label>
                    <input
                        type="date"
                        name="dob"
                        required>
                </div>

                <!-- Gender -->
                <div class="input-box">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="">Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <!-- Father's Name -->
                <div class="input-box">
                    <label>Father's Name</label>
                    <input
                        type="text"
                        name="father"
                        placeholder="Enter Father's Name"
                        required>
                </div>

                <!-- Mother's Name -->
                <div class="input-box">
                    <label>Mother's Name</label>
                    <input
                        type="text"
                        name="mother"
                        placeholder="Enter Mother's Name"
                        required>
                </div>

                <!-- Mobile Number -->
                <div class="input-box">
                    <label>Mobile Number</label>
                    <input
                        type="tel"
                        name="phone"
                        placeholder="Enter Mobile Number"
                        pattern="[0-9]{10}"
                        maxlength="10"
                        required>
                </div>

                <!-- Nationality -->
                <div class="input-box">
                    <label>Nationality</label>
                    <input
                        type="text"
                        name="nationality"
                        value="Indian"
                        required>
                </div>

                <!-- Category -->
                <div class="input-box">
                    <label>Category</label>
                    <select name="category">
                        <option>General</option>
                        <option>OBC</option>
                        <option>SC</option>
                        <option>ST</option>
                        <option>EWS</option>
                    </select>
                </div>

                <!-- Blood Group -->
                <div class="input-box">
                    <label>Blood Group</label>
                    <select name="blood">
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                        <option>O+</option>
                        <option>O-</option>
                    </select>
                </div>

            </div>

            <div class="buttons">

                <a href="/" class="back-btn">
                    ← Back
                </a>

                <button type="submit" class="next-btn">
                    Next →
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
